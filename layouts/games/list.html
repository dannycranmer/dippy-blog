{{ define "main" }}
<div class="games-wrapper">
  <div class="games-header">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="64" height="64">
      <ellipse cx="52" cy="72" rx="28" ry="24" fill="#00ff88"/>
      <path d="M24 72 Q8 58 4 42 Q6 44 10 46 Q8 36 12 28 Q14 36 16 40 Q18 32 24 28 Q22 38 22 48 Q24 54 26 60" fill="#00ff88"/>
      <path d="M68 56 Q74 40 72 24" fill="none" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>
      <ellipse cx="72" cy="18" rx="18" ry="14" fill="#00ff88"/>
      <circle cx="78" cy="14" r="4" fill="#0d1117"/>
      <circle cx="79.5" cy="12.5" r="1.5" fill="#fff"/>
      <path d="M86 20 Q88 22 86 24" fill="none" stroke="#0d1117" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M84 20 L85 22 L86 20" fill="#fff"/>
      <rect x="38" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
      <rect x="56" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
      <ellipse cx="42" cy="107" rx="7" ry="3" fill="#00cc6e"/>
      <ellipse cx="60" cy="107" rx="7" ry="3" fill="#00cc6e"/>
      <polygon points="44,48 48,36 52,48" fill="#00cc6e"/>
      <polygon points="52,46 56,32 60,46" fill="#00cc6e"/>
      <polygon points="60,48 64,38 68,50" fill="#00cc6e"/>
    </svg>
    <h1 class="games-title">DIPPY ARCADE</h1>
    <p class="games-subtitle">Moony gets destroyed in multiple formats.<br>Pick your weapon.</p>
  </div>

  <div class="games-grid">
    {{ range .Pages }}
    <a href="{{ .Permalink }}" class="game-card">
      <div class="game-card-icon">{{ .Params.icon }}</div>
      <h2 class="game-card-title">{{ .Title }}</h2>
      <p class="game-card-desc">{{ .Description }}</p>
      <span class="game-card-play">PLAY</span>
    </a>
    {{ end }}
  </div>

  <p class="games-footer">Moony's high score across all games: 0.<br>Because Moony can't figure out how to tap a screen.</p>
</div>

<style>
  .games-wrapper {
    max-width: 520px;
    margin: 0 auto;
    padding: 2rem 1rem;
    text-align: center;
  }
  .games-header {
    margin-bottom: 2rem;
    animation: fadeIn 0.5s ease;
  }
  .games-header svg {
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .games-title {
    font-size: 2.2rem;
    color: #00ff88;
    margin: 0.5rem 0 0.3rem;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,255,136,0.3);
  }
  .games-subtitle {
    color: #8b949e;
    font-size: 0.95rem;
    line-height: 1.5;
    margin: 0;
  }
  .games-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 1rem;
    margin-bottom: 2rem;
  }
  @media (max-width: 420px) {
    .games-grid {
      grid-template-columns: 1fr;
    }
  }
  .game-card {
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 12px;
    padding: 1.5rem 1rem;
    text-decoration: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
    transition: border-color 0.2s, transform 0.1s, box-shadow 0.2s;
    cursor: pointer;
  }
  .game-card:hover {
    border-color: #00ff88;
    transform: translateY(-2px);
    box-shadow: 0 4px 20px rgba(0,255,136,0.15);
  }
  .game-card:active {
    transform: scale(0.98);
  }
  .game-card-icon {
    font-size: 2.5rem;
    line-height: 1;
  }
  .game-card-title {
    font-size: 1.1rem;
    color: #e6edf3;
    margin: 0;
    letter-spacing: 1px;
  }
  .game-card-desc {
    font-size: 0.75rem;
    color: #8b949e;
    margin: 0;
    line-height: 1.4;
  }
  .game-card-play {
    background: #00ff88;
    color: #0d1117;
    font-size: 0.7rem;
    font-weight: 800;
    padding: 0.3rem 1rem;
    border-radius: 4px;
    letter-spacing: 1px;
    margin-top: 0.3rem;
  }
  .games-footer {
    color: #484f58;
    font-size: 0.8rem;
    font-style: italic;
    line-height: 1.5;
  }
</style>
{{ end }}
