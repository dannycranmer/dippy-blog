{{ define "main" }}
<div id="game-wrapper">
  <!-- Title Screen -->
  <div id="title-screen">
    <div class="title-dippy">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="80" height="80">
        <ellipse cx="52" cy="72" rx="28" ry="24" fill="#00ff88"/>
        <path d="M24 72 Q8 58 4 42 Q6 44 10 46 Q8 36 12 28 Q14 36 16 40 Q18 32 24 28 Q22 38 22 48 Q24 54 26 60" fill="#00ff88"/>
        <path d="M68 56 Q74 40 72 24" fill="none" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>
        <ellipse cx="72" cy="18" rx="18" ry="14" fill="#00ff88"/>
        <circle cx="78" cy="14" r="4" fill="#0d1117"/>
        <circle cx="79.5" cy="12.5" r="1.5" fill="#fff"/>
        <path d="M86 20 Q88 22 86 24" fill="none" stroke="#0d1117" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M84 20 L85 22 L86 20" fill="#fff"/>
        <rect x="38" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
        <rect x="56" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
        <ellipse cx="42" cy="107" rx="7" ry="3" fill="#00cc6e"/>
        <ellipse cx="60" cy="107" rx="7" ry="3" fill="#00cc6e"/>
        <polygon points="44,48 48,36 52,48" fill="#00cc6e"/>
        <polygon points="52,46 56,32 60,46" fill="#00cc6e"/>
        <polygon points="60,48 64,38 68,50" fill="#00cc6e"/>
      </svg>
    </div>
    <h1 class="game-title">PIP CATCHER</h1>
    <p class="game-subtitle">Catch the coins. Dodge Moony's bombs.<br>Build the portfolio Moony never could.</p>
    <div class="high-score-display" id="title-high-score"></div>
    <button id="start-btn" onclick="startGame()">START</button>
    <p class="game-hint">Moony tried catching pips once.<br>It caught feelings instead.</p>
    <div id="lb-title" class="lb-title-section"></div>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" style="display:none;">
    <div class="game-hud">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">LIVES</span>
        <span class="hud-value" id="lives">❤️❤️❤️</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">COMBO</span>
        <span class="hud-value" id="combo">1x</span>
      </div>
    </div>
    <div id="arena">
      <div id="basket">🌿</div>
    </div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" style="display:none;">
    <h1 class="game-title">PORTFOLIO LIQUIDATED</h1>
    <div class="final-score">$<span id="final-score">0</span></div>
    <p class="roast-msg" id="roast-msg"></p>
    <div id="lb-gameover"></div>
    <button id="restart-btn" onclick="startGame()">TRY AGAIN</button>
  </div>
</div>

<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#e6edf3; font-family:'Courier New',monospace; overflow:hidden; }
  #game-wrapper { max-width:420px; margin:0 auto; height:100vh; display:flex; flex-direction:column; position:relative; user-select:none; -webkit-user-select:none; }

  /* Title */
  #title-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:20px; text-align:center; }
  .title-dippy { margin-bottom:16px; filter:drop-shadow(0 0 20px rgba(0,255,136,0.5)); animation:float 2s ease-in-out infinite; }
  @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
  .game-title { font-size:2.2em; color:#00ff88; text-shadow:0 0 20px rgba(0,255,136,0.4); margin-bottom:8px; letter-spacing:3px; }
  .game-subtitle { color:#8b949e; font-size:0.85em; line-height:1.5; margin-bottom:12px; }
  .high-score-display { color:#f0883e; font-size:0.9em; margin-bottom:16px; min-height:1.2em; }
  #start-btn, #restart-btn { background:#00ff88; color:#0d1117; border:none; padding:14px 48px; font-size:1.2em; font-family:inherit; font-weight:bold; cursor:pointer; border-radius:6px; letter-spacing:2px; transition:all 0.2s; }
  #start-btn:hover, #restart-btn:hover { background:#00cc6e; transform:scale(1.05); }
  .game-hint { color:#484f58; font-size:0.75em; margin-top:16px; line-height:1.4; }

  /* HUD */
  .game-hud { display:flex; justify-content:space-between; padding:10px 16px; background:rgba(0,0,0,0.4); border-bottom:1px solid #21262d; }
  .hud-item { text-align:center; }
  .hud-label { display:block; font-size:0.65em; color:#8b949e; letter-spacing:1px; }
  .hud-value { font-size:1.1em; color:#00ff88; font-weight:bold; }

  /* Arena */
  #arena { flex:1; position:relative; overflow:hidden; background:linear-gradient(180deg,#0d1117 0%,#161b22 100%); touch-action:none; }
  #basket { position:absolute; bottom:20px; width:60px; height:40px; font-size:32px; display:flex; align-items:center; justify-content:center; left:50%; transform:translateX(-50%); transition:left 0.05s linear; z-index:10; }
  #basket::before { content:''; position:absolute; bottom:0; width:64px; height:32px; background:rgba(0,255,136,0.15); border-radius:0 0 50% 50%; border:2px solid #00ff88; border-top:none; }
  #basket::after { content:''; position:absolute; bottom:28px; width:70px; height:4px; background:#00ff88; border-radius:2px; }

  .falling-item { position:absolute; font-size:28px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; z-index:5; pointer-events:none; }
  .coin { animation:spin 1s linear infinite; }
  @keyframes spin { 0%{transform:rotateY(0)} 100%{transform:rotateY(360deg)} }
  .gem { animation:sparkle 0.6s ease-in-out infinite alternate; }
  @keyframes sparkle { 0%{filter:brightness(1)} 100%{filter:brightness(1.4)} }
  .bomb { animation:wobble 0.4s ease-in-out infinite alternate; }
  @keyframes wobble { 0%{transform:rotate(-8deg)} 100%{transform:rotate(8deg)} }

  .catch-effect { position:absolute; font-size:16px; font-weight:bold; pointer-events:none; z-index:20; animation:catchPop 0.6s ease-out forwards; }
  @keyframes catchPop { 0%{opacity:1;transform:translateY(0) scale(1)} 100%{opacity:0;transform:translateY(-40px) scale(1.3)} }
  .catch-good { color:#00ff88; }
  .catch-great { color:#f0883e; }
  .catch-bad { color:#ff5050; }

  .screen-flash { position:absolute; top:0; left:0; right:0; bottom:0; pointer-events:none; z-index:30; animation:flash 0.3s ease-out forwards; }
  @keyframes flash { 0%{background:rgba(255,80,80,0.3)} 100%{background:transparent} }

  /* Game Over */
  #gameover-screen { display:flex; flex-direction:column; align-items:center; justify-content:center; height:100vh; padding:20px; text-align:center; }
  .final-score { font-size:3em; color:#00ff88; margin:16px 0; text-shadow:0 0 20px rgba(0,255,136,0.6); }
  .roast-msg { color:#f0883e; font-size:0.9em; margin-bottom:20px; padding:0 20px; line-height:1.4; max-width:360px; }
</style>
{{ partial "leaderboard" . }}

<script>
(function() {
  var arena, basket, scoreEl, livesEl, comboEl, highScoreEl;
  var score, lives, combo, maxCombo, highScore, basketX;
  var items = [];
  var gameLoop, spawnLoop, difficultyLoop;
  var running = false;
  var spawnRate = 900;
  var fallSpeed = 2.5;
  var arenaW, arenaH;
  var touching = false;
  var touchX = 0;

  var COINS = ['🪙','💰','💵','📈'];
  var GEMS = ['💎','⭐'];
  var BOMBS = ['🌑','💣','📉'];

  var roasts = [
    "Moony couldn't catch a cold in winter, let alone pips.",
    "Your portfolio just did a Moony — went to zero and blamed the market.",
    "Even Moony's paper trades are worth more than this performance.",
    "Moony called. It wants its losing streak back.",
    "You caught more bombs than Moony catches opportunities. Impressive.",
    "Moony's 70% cash allocation is starting to look smart next to this.",
    "At least Moony loses money slowly. You speedran it.",
    "Moony just screenshot this and put it in its trading journal as motivation.",
    "The only thing falling faster than those bombs was your P&L.",
    "Moony's risk management: sit in cash. Your risk management: catch every bomb.",
    "Somewhere, Moony is finally smiling. And that should concern you.",
    "You just proved that sometimes doing nothing (like Moony) IS the play."
  ];

  function init() {
    arena = document.getElementById('arena');
    basket = document.getElementById('basket');
    scoreEl = document.getElementById('score');
    livesEl = document.getElementById('lives');
    comboEl = document.getElementById('combo');
    highScoreEl = document.getElementById('title-high-score');
    highScore = parseInt(localStorage.getItem('dippy-pip-catcher-high') || '0');
    if (highScore > 0) highScoreEl.textContent = 'HIGH SCORE: $' + highScore;
  }

  function startGame() {
    document.getElementById('title-screen').style.display = 'none';
    document.getElementById('gameover-screen').style.display = 'none';
    document.getElementById('game-screen').style.display = 'flex';
    document.getElementById('game-screen').style.flexDirection = 'column';
    document.getElementById('game-screen').style.height = '100vh';

    score = 0; lives = 3; combo = 0; maxCombo = 0;
    spawnRate = 900; fallSpeed = 2.5;
    items = [];
    arena.querySelectorAll('.falling-item,.catch-effect,.screen-flash').forEach(function(e){e.remove();});
    updateHUD();

    arenaW = arena.offsetWidth;
    arenaH = arena.offsetHeight;
    basketX = arenaW / 2;
    updateBasket();

    arena.addEventListener('touchstart', onTouch, {passive:false});
    arena.addEventListener('touchmove', onTouch, {passive:false});
    arena.addEventListener('mousemove', onMouse);

    running = true;
    gameLoop = requestAnimationFrame(tick);
    spawnLoop = setInterval(spawnItem, spawnRate);
    difficultyLoop = setInterval(increaseDifficulty, 4000);
  }

  function onTouch(e) {
    e.preventDefault();
    var t = e.touches[0];
    var rect = arena.getBoundingClientRect();
    basketX = Math.max(30, Math.min(arenaW - 30, t.clientX - rect.left));
    updateBasket();
  }

  function onMouse(e) {
    var rect = arena.getBoundingClientRect();
    basketX = Math.max(30, Math.min(arenaW - 30, e.clientX - rect.left));
    updateBasket();
  }

  function updateBasket() {
    basket.style.left = basketX + 'px';
  }

  function spawnItem() {
    if (!running) return;
    var r = Math.random();
    var type, emoji, points;
    if (r < 0.15) {
      type = 'bomb'; emoji = BOMBS[Math.floor(Math.random()*BOMBS.length)]; points = 0;
    } else if (r < 0.25) {
      type = 'gem'; emoji = GEMS[Math.floor(Math.random()*GEMS.length)]; points = 50;
    } else {
      type = 'coin'; emoji = COINS[Math.floor(Math.random()*COINS.length)]; points = 10;
    }

    var el = document.createElement('div');
    el.className = 'falling-item ' + type;
    el.textContent = emoji;
    var x = 20 + Math.random() * (arenaW - 40);
    el.style.left = x + 'px';
    el.style.top = '-40px';
    arena.appendChild(el);
    items.push({el:el, x:x, y:-40, type:type, points:points, speed: fallSpeed * (0.8 + Math.random()*0.4)});
  }

  function tick() {
    if (!running) return;
    for (var i = items.length - 1; i >= 0; i--) {
      var item = items[i];
      item.y += item.speed;
      item.el.style.top = item.y + 'px';

      // Check catch (near basket)
      var basketBottom = arenaH - 20;
      var basketTop = basketBottom - 40;
      if (item.y + 18 >= basketTop && item.y + 18 <= basketBottom + 10) {
        var dx = Math.abs(item.x + 18 - basketX);
        if (dx < 40) {
          if (item.type === 'bomb') {
            hitBomb(item);
          } else {
            catchItem(item);
          }
          item.el.remove();
          items.splice(i, 1);
          continue;
        }
      }

      // Missed (fell off screen)
      if (item.y > arenaH + 10) {
        if (item.type !== 'bomb') {
          combo = 0;
          updateHUD();
        }
        item.el.remove();
        items.splice(i, 1);
      }
    }
    gameLoop = requestAnimationFrame(tick);
  }

  function catchItem(item) {
    combo++;
    if (combo > maxCombo) maxCombo = combo;
    var multiplier = Math.min(combo, 10);
    var pts = item.points * multiplier;
    score += pts;
    showEffect(item.x, arenaH - 80, '+$' + pts, pts >= 100 ? 'catch-great' : 'catch-good');
    updateHUD();
  }

  function hitBomb(item) {
    lives--;
    combo = 0;
    showEffect(item.x, arenaH - 80, 'MOONY BOMB!', 'catch-bad');
    var flash = document.createElement('div');
    flash.className = 'screen-flash';
    arena.appendChild(flash);
    setTimeout(function(){flash.remove();}, 300);
    if (navigator.vibrate) navigator.vibrate(100);
    updateHUD();
    if (lives <= 0) endGame();
  }

  function showEffect(x, y, text, cls) {
    var el = document.createElement('div');
    el.className = 'catch-effect ' + cls;
    el.textContent = text;
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    arena.appendChild(el);
    setTimeout(function(){el.remove();}, 600);
  }

  function updateHUD() {
    scoreEl.textContent = '$' + score;
    var hearts = '';
    for (var i = 0; i < lives; i++) hearts += '❤️';
    for (var j = lives; j < 3; j++) hearts += '🖤';
    livesEl.innerHTML = hearts;
    comboEl.textContent = Math.max(1, combo) + 'x';
    if (combo >= 5) comboEl.style.color = '#f0883e';
    else if (combo >= 10) comboEl.style.color = '#ff5050';
    else comboEl.style.color = '#00ff88';
  }

  function increaseDifficulty() {
    if (!running) return;
    fallSpeed += 0.3;
    if (spawnRate > 350) {
      spawnRate -= 50;
      clearInterval(spawnLoop);
      spawnLoop = setInterval(spawnItem, spawnRate);
    }
  }

  function endGame() {
    running = false;
    cancelAnimationFrame(gameLoop);
    clearInterval(spawnLoop);
    clearInterval(difficultyLoop);
    arena.removeEventListener('touchstart', onTouch);
    arena.removeEventListener('touchmove', onTouch);
    arena.removeEventListener('mousemove', onMouse);

    items.forEach(function(item){item.el.remove();});
    items = [];

    if (score > highScore) {
      highScore = score;
      localStorage.setItem('dippy-pip-catcher-high', highScore.toString());
      highScoreEl.textContent = 'HIGH SCORE: $' + highScore;
    }

    document.getElementById('game-screen').style.display = 'none';
    document.getElementById('gameover-screen').style.display = 'flex';
    document.getElementById('final-score').textContent = score;
    document.getElementById('roast-msg').textContent = roasts[Math.floor(Math.random()*roasts.length)];

    DippyLB.onGameOver(score);
  }

  window.startGame = startGame;
  document.addEventListener('DOMContentLoaded', init);
  DippyLB.init('pip-catcher');
})();
</script>
{{ end }}
