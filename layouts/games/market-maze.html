    top: 50%;

    font-weight: bold;
    color: #00ff88;
    text-shadow: 0 0 30px rgba(0,255,136,0.6);

  }

  @media (min-width: 500px) {
    #mobile-controls { display: none; }
  }
</style>

<script>
(function() {
  'use strict';

  // ---- Constants ----
  var BASE_SIZE = 13;
  var SIZE_STEP = 2;
  var MAX_SIZE = 25;
  var BASE_MOONY_INTERVAL = 600;
  var MOONY_SPEEDUP = 20;
  var MIN_MOONY_INTERVAL = 150;
  var COIN_COUNT_BASE = 8;
  var LS_KEY = 'dippy-market-maze-high';

  var ROASTS = [
    "Moony caught you holding bags again.",
    "You trade like you navigate. Poorly.",
    "Even a dead cat bounce would have escaped that.",
    "Moony sends regards from the trading floor.",
    "Your exit strategy needs an exit strategy.",
    "Congratulations, you played yourself.",
    "Moony's portfolio outperformed your legs.",
    "This is why you DCA, not YOLO through mazes.",
    "Caught at the top. Classic retail move.",
    "Your stop-loss? Your legs. Both failed.",
    "Paper hands, paper legs.",
    "Moony was cash gang the whole time. Still faster.",
    "The market always wins. Especially Moony."
  ];

  // ---- State ----
  var maze, cols, rows, player, moony, exitPos, coins;
  var level, totalCoins, startTime, timerInterval, moonyInterval, moonyTimer;
  var gameActive = false;
  var highScore = parseInt(localStorage.getItem(LS_KEY)) || 0;

  // ---- Screens ----
  var titleScreen = document.getElementById('title-screen');
  var gameScreen = document.getElementById('game-screen');
  var gameoverScreen = document.getElementById('gameover-screen');
  var mazeContainer = document.getElementById('maze-container');

  function showScreen(s) {
    titleScreen.style.display = 'none';
    gameScreen.style.display = 'none';
    gameoverScreen.style.display = 'none';
    s.style.display = '';
  }

  function updateHighScoreDisplay() {
    var el1 = document.getElementById('title-high-score');
    var el2 = document.getElementById('gameover-high-score');
    var text = highScore > 0 ? ('HIGH SCORE: ' + highScore) : '';
    if (el1) el1.textContent = text;
    if (el2) el2.textContent = text;
  }
  updateHighScoreDisplay();

  // ---- Maze Generation (Recursive Backtracking) ----
  // Each cell: { top: bool, right: bool, bottom: bool, left: bool, visited: bool }
  function generateMaze(w, h) {
    var grid = [];
    for (var y = 0; y < h; y++) {
      grid[y] = [];
      for (var x = 0; x < w; x++) {
        grid[y][x] = { top: true, right: true, bottom: true, left: true, visited: false };
      }
    }

    var stack = [];
    var cx = 0, cy = 0;
    grid[cy][cx].visited = true;
    stack.push([cx, cy]);

    var dirs = [[0,-1,'top','bottom'],[1,0,'right','left'],[0,1,'bottom','top'],[-1,0,'left','right']];

    while (stack.length > 0) {
      var neighbors = [];
      for (var d = 0; d < dirs.length; d++) {
        var nx = cx + dirs[d][0], ny = cy + dirs[d][1];
        if (nx >= 0 && nx < w && ny >= 0 && ny < h && !grid[ny][nx].visited) {
          neighbors.push(d);
        }
      }
      if (neighbors.length > 0) {
        var pick = neighbors[Math.floor(Math.random() * neighbors.length)];
        var dir = dirs[pick];
        var nx2 = cx + dir[0], ny2 = cy + dir[1];
        grid[cy][cx][dir[2]] = false;
        grid[ny2][nx2][dir[3]] = false;
        grid[ny2][nx2].visited = true;
        stack.push([cx, cy]);
        cx = nx2; cy = ny2;
      } else {
        var prev = stack.pop();
        cx = prev[0]; cy = prev[1];
      }
    }
    return grid;
  }

  // ---- BFS Pathfinding ----
  function bfs(grid, sx, sy, tx, ty, w, h) {
    if (sx === tx && sy === ty) return null;
    var visited = [];
    for (var y = 0; y < h; y++) { visited[y] = []; for (var x = 0; x < w; x++) visited[y][x] = false; }
    var queue = [[sx, sy, null]];
    visited[sy][sx] = true;
    var dirs = [[0,-1,'top'],[1,0,'right'],[0,1,'bottom'],[-1,0,'left']];

    while (queue.length > 0) {
      var cur = queue.shift();
      var cx2 = cur[0], cy2 = cur[1], firstStep = cur[2];
      for (var d = 0; d < dirs.length; d++) {
        var dir = dirs[d];
        if (grid[cy2][cx2][dir[2]]) continue; // wall blocks
        var nx = cx2 + dir[0], ny = cy2 + dir[1];
        if (nx < 0 || nx >= w || ny < 0 || ny >= h) continue;
        if (visited[ny][nx]) continue;
        visited[ny][nx] = true;
        var step = firstStep || { x: nx, y: ny };
        if (nx === tx && ny === ty) return step;
        queue.push([nx, ny, step]);
      }
    }
    return null;
  }

  // ---- Place Coins ----
  function placeCoins(grid, w, h, count) {
    var placed = [];
    var attempts = 0;
    while (placed.length < count && attempts < 500) {
      attempts++;
      var cx3 = Math.floor(Math.random() * w);
      var cy3 = Math.floor(Math.random() * h);
      // not on player start, exit, or moony start
      if (cx3 === 0 && cy3 === 0) continue;
      if (cx3 === w - 1 && cy3 === h - 1) continue;
      if (cx3 === Math.floor(w / 2) && cy3 === Math.floor(h / 2)) continue;
      var dup = false;
      for (var i = 0; i < placed.length; i++) {
        if (placed[i].x === cx3 && placed[i].y === cy3) { dup = true; break; }
      }
      if (!dup) placed.push({ x: cx3, y: cy3 });
    }
    return placed;
  }

  // ---- Render Maze ----
  function renderMaze() {
    mazeContainer.innerHTML = '';
    var cellSize = Math.floor(Math.min(396, window.innerWidth - 36) / cols);
    mazeContainer.style.gridTemplateColumns = 'repeat(' + cols + ', ' + cellSize + 'px)';
    mazeContainer.style.gridTemplateRows = 'repeat(' + rows + ', ' + cellSize + 'px)';
    mazeContainer.style.width = (cellSize * cols) + 'px';
    mazeContainer.style.fontSize = Math.max(10, Math.floor(cellSize * 0.6)) + 'px';

    for (var y = 0; y < rows; y++) {
      for (var x = 0; x < cols; x++) {
        var cell = document.createElement('div');
        cell.className = 'maze-cell';
        cell.id = 'cell-' + x + '-' + y;
        var m = maze[y][x];
        if (m.top) cell.classList.add('wall-top');
        if (m.right) cell.classList.add('wall-right');
        if (m.bottom) cell.classList.add('wall-bottom');
        if (m.left) cell.classList.add('wall-left');

        // Exit
        if (x === exitPos.x && y === exitPos.y) {
          cell.classList.add('exit-cell');
          cell.innerHTML = '<span class="entity">&#x1F4B0;</span>';
        }
        mazeContainer.appendChild(cell);
      }
    }
    renderEntities();
  }

  function renderEntities() {
    // Clear previous entity markers
    var prevPlayer = document.querySelector('.player-cell');
    if (prevPlayer) { prevPlayer.classList.remove('player-cell'); var pe = prevPlayer.querySelector('.player-entity'); if (pe) pe.remove(); }
    var prevMoony = document.querySelector('.moony-cell');
    if (prevMoony) { prevMoony.classList.remove('moony-cell'); var me = prevMoony.querySelector('.moony-entity'); if (me) me.remove(); }

    // Render coins
    for (var i = 0; i < coins.length; i++) {
      var c = coins[i];
      var coinCell = document.getElementById('cell-' + c.x + '-' + c.y);
      if (coinCell && !coinCell.querySelector('.coin')) {
        var coinEl = document.createElement('span');
        coinEl.className = 'coin';
        coinEl.textContent = '$';
        coinCell.appendChild(coinEl);
      }
    }

    // Player
    var pCell = document.getElementById('cell-' + player.x + '-' + player.y);
    if (pCell) {
      pCell.classList.add('player-cell');
      var pEl = document.createElement('span');
      pEl.className = 'entity player-entity';
      pEl.innerHTML = '&#x1F995;';
      pCell.appendChild(pEl);
    }

    // Moony
    var mCell = document.getElementById('cell-' + moony.x + '-' + moony.y);
    if (mCell) {
      mCell.classList.add('moony-cell');
      var mEl = document.createElement('span');
      mEl.className = 'entity moony-entity';
      mEl.innerHTML = '&#x1F319;';
      mCell.appendChild(mEl);
    }
  }

  // ---- Game Logic ----
  window.startGame = function() {
    level = 1;
    totalCoins = 0;
    startTime = Date.now();
    startLevel();
    showScreen(gameScreen);
  };

  function startLevel() {
    cols = Math.min(BASE_SIZE + (level - 1) * SIZE_STEP, MAX_SIZE);
    rows = cols;
    maze = generateMaze(cols, rows);
    player = { x: 0, y: 0 };
    moony = { x: Math.floor(cols / 2), y: Math.floor(rows / 2) };
    exitPos = { x: cols - 1, y: rows - 1 };
    coins = placeCoins(maze, cols, rows, COIN_COUNT_BASE + (level - 1) * 2);
    gameActive = true;

    document.getElementById('hud-level').textContent = level;
    document.getElementById('hud-coins').textContent = totalCoins;

    renderMaze();

    // Timer
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      if (!gameActive) return;
      var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);
      document.getElementById('hud-timer').textContent = elapsed;
    }, 100);

    // Moony AI
    if (moonyTimer) clearInterval(moonyTimer);
    var interval = Math.max(BASE_MOONY_INTERVAL - (level - 1) * MOONY_SPEEDUP, MIN_MOONY_INTERVAL);
    moonyTimer = setInterval(function() {
      if (!gameActive) return;
      moveMoony();
    }, interval);
  }

  window.movePlayer = function(dx, dy) {
    if (!gameActive) return;
    var nx = player.x + dx;
    var ny = player.y + dy;
    if (nx < 0 || nx >= cols || ny < 0 || ny >= rows) return;

    // Check wall
    var cell = maze[player.y][player.x];
    if (dx === 1 && cell.right) return;
    if (dx === -1 && cell.left) return;
    if (dy === 1 && cell.bottom) return;
    if (dy === -1 && cell.top) return;

    player.x = nx;
    player.y = ny;

    // Collect coin
    for (var i = 0; i < coins.length; i++) {
      if (coins[i].x === nx && coins[i].y === ny) {
        coins.splice(i, 1);
        totalCoins++;
        document.getElementById('hud-coins').textContent = totalCoins;
        // Remove coin element
        var coinCell = document.getElementById('cell-' + nx + '-' + ny);
        if (coinCell) { var ce = coinCell.querySelector('.coin'); if (ce) ce.remove(); }
        break;
      }
    }

    renderEntities();

    // Check moony catch
    if (player.x === moony.x && player.y === moony.y) {
      endGame(false);
      return;
    }

    // Check exit
    if (player.x === exitPos.x && player.y === exitPos.y) {
      levelComplete();
    }
  };

  function moveMoony() {
    var step = bfs(maze, moony.x, moony.y, player.x, player.y, cols, rows);
    if (step) {
      moony.x = step.x;
      moony.y = step.y;
      renderEntities();

      if (moony.x === player.x && moony.y === player.y) {
        endGame(false);
      }
    }
  }

  function levelComplete() {
    gameActive = false;
    if (moonyTimer) clearInterval(moonyTimer);

    // Flash
    var flash = document.createElement('div');
    flash.className = 'level-flash';
    flash.textContent = 'LEVEL ' + level + ' COMPLETE!';
    document.body.appendChild(flash);

    level++;
    setTimeout(function() {
      flash.remove();
      startLevel();
    }, 1000);
  }

  function calcScore() {
    var elapsed = (Date.now() - startTime) / 1000;
    var timeBonus = Math.max(1, Math.round(1000 / Math.max(elapsed, 1)));
    return totalCoins * 10 + (level - 1) * 50 + timeBonus;
  }

  function endGame(won) {
    gameActive = false;
    if (timerInterval) clearInterval(timerInterval);
    if (moonyTimer) clearInterval(moonyTimer);

    var score = calcScore();
    var elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (score > highScore) {
      highScore = score;
      localStorage.setItem(LS_KEY, highScore);
    }

    document.getElementById('gameover-title').textContent = won ? 'ESCAPED!' : 'BUSTED';
    document.getElementById('gameover-title').style.color = won ? '#00ff88' : '#ff5050';
    document.getElementById('final-score').textContent = score;
    document.getElementById('stat-level').textContent = level;
    document.getElementById('stat-coins').textContent = totalCoins;
    document.getElementById('stat-time').textContent = elapsed + 's';
    document.getElementById('gameover-roast').textContent = ROASTS[Math.floor(Math.random() * ROASTS.length)];
    updateHighScoreDisplay();

    showScreen(gameoverScreen);

    if (typeof DippyLB !== 'undefined') DippyLB.onGameOver(score);
  }

  // ---- Keyboard Controls ----
  document.addEventListener('keydown', function(e) {
    if (!gameActive) {
      if (e.key === 'Enter' || e.key === ' ') {
        if (titleScreen.style.display !== 'none') startGame();
        else if (gameoverScreen.style.display !== 'none') startGame();
      }
      return;
    }
    switch (e.key) {
      case 'ArrowUp':    case 'w': case 'W': e.preventDefault(); movePlayer(0, -1); break;
      case 'ArrowDown':  case 's': case 'S': e.preventDefault(); movePlayer(0, 1);  break;
      case 'ArrowLeft':  case 'a': case 'A': e.preventDefault(); movePlayer(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); movePlayer(1, 0);  break;
    }
  });

  // ---- Swipe Controls ----
  var touchStartX = 0, touchStartY = 0;
  document.addEventListener('touchstart', function(e) {
    if (e.target.classList.contains('ctrl-btn')) return;
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive: true });

  document.addEventListener('touchend', function(e) {
    if (!gameActive) return;
    if (e.target.classList.contains('ctrl-btn')) return;
    var dx = e.changedTouches[0].clientX - touchStartX;
    var dy = e.changedTouches[0].clientY - touchStartY;
    var absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;
    if (absDx > absDy) {
      movePlayer(dx > 0 ? 1 : -1, 0);
    } else {
      movePlayer(0, dy > 0 ? 1 : -1);
    }
  }, { passive: true });

  // ---- Init Leaderboard ----
  if (typeof DippyLB !== 'undefined') DippyLB.init('market-maze');

})();
</script>
