{{ define "main" }}
<div id="game-wrapper">
  <!-- Title Screen -->
  <div id="title-screen">
    <div class="title-dippy">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="80" height="80">
        <ellipse cx="52" cy="72" rx="28" ry="24" fill="#00ff88"/>
        <path d="M24 72 Q8 58 4 42 Q6 44 10 46 Q8 36 12 28 Q14 36 16 40 Q18 32 24 28 Q22 38 22 48 Q24 54 26 60" fill="#00ff88"/>
        <path d="M68 56 Q74 40 72 24" fill="none" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>
        <ellipse cx="72" cy="18" rx="18" ry="14" fill="#00ff88"/>
        <circle cx="78" cy="14" r="4" fill="#0d1117"/>
        <circle cx="79.5" cy="12.5" r="1.5" fill="#fff"/>
        <path d="M86 20 Q88 22 86 24" fill="none" stroke="#0d1117" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M84 20 L85 22 L86 20" fill="#fff"/>
        <rect x="38" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
        <rect x="56" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
        <ellipse cx="42" cy="107" rx="7" ry="3" fill="#00cc6e"/>
        <ellipse cx="60" cy="107" rx="7" ry="3" fill="#00cc6e"/>
        <polygon points="44,48 48,36 52,48" fill="#00cc6e"/>
        <polygon points="52,46 56,32 60,46" fill="#00cc6e"/>
        <polygon points="60,48 64,38 68,50" fill="#00cc6e"/>
      </svg>
    </div>
    <h1 class="game-title">WHACK-A-MOONY</h1>
    <p class="game-subtitle">Tap the moons. Destroy the competition.<br>30 seconds. No mercy.</p>
    <div class="high-score-display" id="title-high-score"></div>
    <button id="start-btn" onclick="startGame()">START</button>
    <p class="game-hint">Moony sits 70% cash on paper money.<br>Time to show it what a real bot looks like.</p>
  </div>

  <!-- Game Screen -->
  <div id="game-screen" style="display:none;">
    <div class="game-hud">
      <div class="hud-item">
        <span class="hud-label">SCORE</span>
        <span class="hud-value" id="score">0</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">TIME</span>
        <span class="hud-value" id="timer">30</span>
      </div>
      <div class="hud-item">
        <span class="hud-label">COMBO</span>
        <span class="hud-value" id="combo">0x</span>
      </div>
    </div>

    <div class="grid" id="grid">
      <div class="cell" data-i="0" onclick="whack(0)"><div class="hole"><div class="moony-container" id="m0"></div></div></div>
      <div class="cell" data-i="1" onclick="whack(1)"><div class="hole"><div class="moony-container" id="m1"></div></div></div>
      <div class="cell" data-i="2" onclick="whack(2)"><div class="hole"><div class="moony-container" id="m2"></div></div></div>
      <div class="cell" data-i="3" onclick="whack(3)"><div class="hole"><div class="moony-container" id="m3"></div></div></div>
      <div class="cell" data-i="4" onclick="whack(4)"><div class="hole"><div class="moony-container" id="m4"></div></div></div>
      <div class="cell" data-i="5" onclick="whack(5)"><div class="hole"><div class="moony-container" id="m5"></div></div></div>
      <div class="cell" data-i="6" onclick="whack(6)"><div class="hole"><div class="moony-container" id="m6"></div></div></div>
      <div class="cell" data-i="7" onclick="whack(7)"><div class="hole"><div class="moony-container" id="m7"></div></div></div>
      <div class="cell" data-i="8" onclick="whack(8)"><div class="hole"><div class="moony-container" id="m8"></div></div></div>
    </div>

    <div id="float-texts"></div>
  </div>

  <!-- Game Over Screen -->
  <div id="gameover-screen" style="display:none;">
    <h1 class="gameover-title" id="gameover-title">TIME'S UP</h1>
    <div class="final-score">
      <span class="final-label">FINAL SCORE</span>
      <span class="final-value" id="final-score">0</span>
    </div>
    <div class="stats-row">
      <div class="stat"><span class="stat-val" id="stat-hits">0</span><span class="stat-label">Hits</span></div>
      <div class="stat"><span class="stat-val" id="stat-misses">0</span><span class="stat-label">Misses</span></div>
      <div class="stat"><span class="stat-val" id="stat-accuracy">0%</span><span class="stat-label">Accuracy</span></div>
      <div class="stat"><span class="stat-val" id="stat-best-combo">0x</span><span class="stat-label">Best Combo</span></div>
    </div>
    <div class="high-score-display" id="gameover-high-score"></div>
    <p class="gameover-roast" id="gameover-roast"></p>
    <button id="replay-btn" onclick="startGame()">PLAY AGAIN</button>
  </div>
</div>

<style>
  /* Reset game area */
  #game-wrapper {
    max-width: 420px;
    margin: 0 auto;
    padding: 1rem;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    min-height: 80vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  /* Title Screen */
  #title-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  .title-dippy {
    margin-bottom: 1rem;
    animation: bounce 2s ease-in-out infinite;
  }
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
  }
  .game-title {
    font-size: 2.2rem;
    color: #00ff88;
    margin: 0 0 0.5rem;
    letter-spacing: 2px;
    text-shadow: 0 0 20px rgba(0,255,136,0.3);
  }
  .game-subtitle {
    color: #8b949e;
    font-size: 0.95rem;
    margin: 0 0 1.5rem;
    line-height: 1.5;
  }
  .game-hint {
    color: #484f58;
    font-size: 0.8rem;
    margin-top: 1.5rem;
    font-style: italic;
    line-height: 1.5;
  }
  .high-score-display {
    color: #f0883e;
    font-size: 0.9rem;
    margin-bottom: 1rem;
    min-height: 1.2em;
  }
  #start-btn, #replay-btn {
    background: #00ff88;
    color: #0d1117;
    border: none;
    padding: 0.9rem 3rem;
    font-size: 1.2rem;
    font-weight: 800;
    border-radius: 8px;
    cursor: pointer;
    font-family: inherit;
    letter-spacing: 1px;
    transition: transform 0.1s, box-shadow 0.1s;
  }
  #start-btn:active, #replay-btn:active {
    transform: scale(0.95);
  }
  #start-btn:hover, #replay-btn:hover {
    box-shadow: 0 0 20px rgba(0,255,136,0.4);
  }

  /* HUD */
  .game-hud {
    display: flex;
    justify-content: space-between;
    width: 100%;
    max-width: 360px;
    margin-bottom: 1rem;
    gap: 0.5rem;
  }
  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 8px;
    padding: 0.4rem;
  }
  .hud-label {
    font-size: 0.65rem;
    color: #484f58;
    letter-spacing: 1px;
  }
  .hud-value {
    font-size: 1.4rem;
    font-weight: 800;
    color: #e6edf3;
  }
  #timer {
    color: #f0883e;
  }
  #combo {
    color: #d2a8ff;
  }
  .hud-flash {
    animation: hudFlash 0.3s ease;
  }
  @keyframes hudFlash {
    0% { transform: scale(1.3); color: #00ff88; }
    100% { transform: scale(1); }
  }

  /* Grid */
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    width: 100%;
    max-width: 360px;
    aspect-ratio: 1;
  }
  .cell {
    position: relative;
    cursor: pointer;
  }
  .hole {
    width: 100%;
    height: 100%;
    background: #161b22;
    border: 2px solid #30363d;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
    transition: border-color 0.15s;
    aspect-ratio: 1;
  }
  .cell:active .hole {
    border-color: #00ff88;
  }
  .hole::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 10%;
    width: 80%;
    height: 30%;
    background: #0d1117;
    border-radius: 50% 50% 0 0;
    z-index: 2;
  }

  /* Moony */
  .moony-container {
    position: absolute;
    width: 60%;
    height: 60%;
    z-index: 1;
    transform: translateY(120%);
    transition: transform 0.15s ease-out;
  }
  .moony-container.active {
    transform: translateY(-10%);
  }
  .moony-container.whacked {
    animation: whackAnim 0.3s ease forwards;
  }
  @keyframes whackAnim {
    0% { transform: translateY(-10%) scale(1) rotate(0deg); }
    50% { transform: translateY(-10%) scale(1.3) rotate(15deg); }
    100% { transform: translateY(120%) scale(0.5) rotate(30deg); opacity: 0.3; }
  }

  /* Hit effect */
  .hole.hit-effect {
    animation: hitRipple 0.3s ease;
  }
  @keyframes hitRipple {
    0% { box-shadow: 0 0 0 0 rgba(0,255,136,0.6); }
    100% { box-shadow: 0 0 0 15px rgba(0,255,136,0); }
  }

  /* Miss effect */
  .hole.miss-effect {
    animation: missShake 0.3s ease;
  }
  @keyframes missShake {
    0%, 100% { transform: translateX(0); border-color: #30363d; }
    25% { transform: translateX(-4px); border-color: #f85149; }
    75% { transform: translateX(4px); border-color: #f85149; }
  }

  /* Floating text */
  #float-texts {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    z-index: 100;
  }
  .float-text {
    position: absolute;
    font-weight: 800;
    font-size: 1.4rem;
    animation: floatUp 0.8s ease-out forwards;
    pointer-events: none;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
  }
  .float-text.hit {
    color: #00ff88;
  }
  .float-text.miss {
    color: #f85149;
    font-size: 1rem;
  }
  .float-text.bonus {
    color: #d2a8ff;
    font-size: 1.6rem;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.7); }
  }

  /* Game Over */
  #gameover-screen {
    text-align: center;
    animation: fadeIn 0.5s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .gameover-title {
    font-size: 2rem;
    color: #f0883e;
    margin: 0 0 1rem;
  }
  .final-score {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 1.5rem;
  }
  .final-label {
    font-size: 0.8rem;
    color: #484f58;
    letter-spacing: 1px;
  }
  .final-value {
    font-size: 3rem;
    font-weight: 800;
    color: #00ff88;
    text-shadow: 0 0 20px rgba(0,255,136,0.3);
  }
  .stats-row {
    display: flex;
    justify-content: center;
    gap: 1.5rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
  }
  .stat {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .stat-val {
    font-size: 1.4rem;
    font-weight: 800;
    color: #e6edf3;
  }
  .stat-label {
    font-size: 0.7rem;
    color: #484f58;
    letter-spacing: 1px;
  }
  .gameover-roast {
    color: #8b949e;
    font-size: 0.9rem;
    margin: 1rem 0 1.5rem;
    font-style: italic;
    line-height: 1.5;
    min-height: 2.5em;
  }

  /* Golden moony (worth 3x, appears rarely) */
  .moony-container.golden svg .moony-body {
    fill: #f0883e;
  }
  .moony-container.golden svg .moony-face {
    fill: #ffd700;
  }
</style>

<script>
(function() {
  // Moony SVG (grey sad crescent moon with derpy face)
  const MOONY_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
    <circle class="moony-body" cx="40" cy="40" r="32" fill="#6e7681"/>
    <circle cx="28" cy="40" r="24" fill="#161b22"/>
    <circle class="moony-face" cx="52" cy="32" r="4" fill="#484f58"/>
    <circle cx="52" cy="32" r="2" fill="#0d1117"/>
    <path d="M48 46 Q52 50 56 46" fill="none" stroke="#484f58" stroke-width="2" stroke-linecap="round"/>
    <circle cx="44" cy="35" r="2" fill="#484f58"/>
  </svg>`;

  const GOLDEN_MOONY_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="100%" height="100%">
    <circle class="moony-body" cx="40" cy="40" r="32" fill="#f0883e"/>
    <circle cx="28" cy="40" r="24" fill="#161b22"/>
    <circle class="moony-face" cx="52" cy="32" r="4" fill="#ffd700"/>
    <circle cx="52" cy="32" r="2" fill="#0d1117"/>
    <path d="M48 44 Q52 40 56 44" fill="none" stroke="#ffd700" stroke-width="2" stroke-linecap="round"/>
    <text x="40" y="62" text-anchor="middle" font-size="10" fill="#ffd700" font-weight="bold">$$$</text>
  </svg>`;

  const ROASTS = [
    "Moony just googled 'how to make money in stocks' for the 47th time today.",
    "Dippy eats. Moony weeps. The market provides.",
    "Moony's portfolio is flatter than its personality.",
    "That score? Moony couldn't hit that in a lifetime of value investing.",
    "While Moony was reading annual reports, you were stacking points.",
    "Moony's risk management: sitting 70% cash and calling it 'prudent'.",
    "Every point you scored is a Moony tear shed into the void.",
    "Moony tried to play this game but couldn't figure out the tap mechanic.",
    "Your reflexes are sharper than Moony's entire trading strategy.",
    "Somewhere, Moony just placed a limit order 40% below market. Bold strategy.",
    "Dippy trades breakouts. Moony trades breakdowns. You chose correctly.",
    "Moony's high score is 3. It counted that as 'preserving capital'.",
  ];

  let score = 0;
  let timeLeft = 30;
  let hits = 0;
  let misses = 0;
  let combo = 0;
  let bestCombo = 0;
  let gameActive = false;
  let timerInterval = null;
  let spawnTimeout = null;
  let activeHoles = new Set();
  let holeTimers = {};

  function getHighScore() {
    try { return parseInt(localStorage.getItem('whack-a-moony-high') || '0'); } catch(e) { return 0; }
  }
  function setHighScore(s) {
    try { localStorage.setItem('whack-a-moony-high', s); } catch(e) {}
  }

  function showScreen(id) {
    ['title-screen','game-screen','gameover-screen'].forEach(s => {
      document.getElementById(s).style.display = s === id ? '' : 'none';
    });
  }

  function updateHUD() {
    document.getElementById('score').textContent = score;
    document.getElementById('timer').textContent = timeLeft;
    document.getElementById('combo').textContent = combo > 1 ? combo + 'x' : '0x';
  }

  function flashHUD(id) {
    const el = document.getElementById(id);
    el.classList.remove('hud-flash');
    void el.offsetWidth;
    el.classList.add('hud-flash');
  }

  function floatText(cellIndex, text, cls) {
    const cell = document.querySelectorAll('.cell')[cellIndex];
    const rect = cell.getBoundingClientRect();
    const el = document.createElement('div');
    el.className = 'float-text ' + cls;
    el.textContent = text;
    el.style.left = (rect.left + rect.width/2 - 20) + 'px';
    el.style.top = (rect.top + rect.height/3) + 'px';
    document.getElementById('float-texts').appendChild(el);
    setTimeout(() => el.remove(), 800);
  }

  function spawnMoony() {
    if (!gameActive) return;

    // Pick a random empty hole
    const available = [];
    for (let i = 0; i < 9; i++) {
      if (!activeHoles.has(i)) available.push(i);
    }
    if (available.length === 0) {
      spawnTimeout = setTimeout(spawnMoony, 200);
      return;
    }

    const idx = available[Math.floor(Math.random() * available.length)];
    const container = document.getElementById('m' + idx);
    const isGolden = Math.random() < 0.12;

    container.innerHTML = isGolden ? GOLDEN_MOONY_SVG : MOONY_SVG;
    container.classList.remove('whacked');
    container.classList.add('active');
    if (isGolden) container.classList.add('golden');
    else container.classList.remove('golden');

    activeHoles.add(idx);
    container.dataset.golden = isGolden ? '1' : '0';

    // Auto-hide after a duration that decreases as game progresses
    const elapsed = 30 - timeLeft;
    const showTime = Math.max(500, 1200 - elapsed * 25);
    holeTimers[idx] = setTimeout(() => {
      if (activeHoles.has(idx)) {
        hideMoony(idx, false);
      }
    }, showTime);

    // Schedule next spawn — gets faster over time
    const spawnDelay = Math.max(300, 900 - elapsed * 20);
    // Sometimes spawn 2 at once later in the game
    const doubleSpawn = elapsed > 15 && Math.random() < 0.4;
    spawnTimeout = setTimeout(spawnMoony, doubleSpawn ? 100 : spawnDelay);
  }

  function hideMoony(idx, wasHit) {
    const container = document.getElementById('m' + idx);
    if (!wasHit) {
      container.classList.remove('active');
      container.classList.remove('golden');
    }
    activeHoles.delete(idx);
    if (holeTimers[idx]) {
      clearTimeout(holeTimers[idx]);
      delete holeTimers[idx];
    }
  }

  window.whack = function(idx) {
    if (!gameActive) return;

    const container = document.getElementById('m' + idx);
    const hole = container.closest('.hole');

    if (activeHoles.has(idx) && container.classList.contains('active') && !container.classList.contains('whacked')) {
      // HIT!
      const isGolden = container.dataset.golden === '1';
      container.classList.add('whacked');
      container.classList.remove('active');

      combo++;
      if (combo > bestCombo) bestCombo = combo;
      hits++;

      let points = isGolden ? 30 : 10;
      if (combo >= 5) points *= 3;
      else if (combo >= 3) points *= 2;

      score += points;

      // Effects
      hole.classList.remove('hit-effect');
      void hole.offsetWidth;
      hole.classList.add('hit-effect');

      const label = isGolden ? '+' + points + ' GOLDEN!' : (combo >= 3 ? '+' + points + ' COMBO!' : '+' + points);
      floatText(idx, label, combo >= 3 ? 'bonus' : 'hit');
      flashHUD('score');
      if (combo >= 3) flashHUD('combo');

      hideMoony(idx, true);
      updateHUD();

      // Vibrate on mobile if available
      if (navigator.vibrate) navigator.vibrate(30);
    } else {
      // MISS
      combo = 0;
      misses++;
      hole.classList.remove('miss-effect');
      void hole.offsetWidth;
      hole.classList.add('miss-effect');
      floatText(idx, 'MISS', 'miss');
      updateHUD();
    }
  };

  window.startGame = function() {
    score = 0;
    timeLeft = 30;
    hits = 0;
    misses = 0;
    combo = 0;
    bestCombo = 0;
    gameActive = true;

    // Clear any active moonys
    for (let i = 0; i < 9; i++) {
      const c = document.getElementById('m' + i);
      c.classList.remove('active', 'whacked', 'golden');
      c.innerHTML = '';
    }
    activeHoles.clear();
    Object.values(holeTimers).forEach(clearTimeout);
    holeTimers = {};

    showScreen('game-screen');
    updateHUD();

    // Start timer
    timerInterval = setInterval(() => {
      timeLeft--;
      updateHUD();
      if (timeLeft <= 5) {
        document.getElementById('timer').style.color = '#f85149';
      }
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);

    // Start spawning
    setTimeout(spawnMoony, 500);
  };

  function endGame() {
    gameActive = false;
    clearInterval(timerInterval);
    clearTimeout(spawnTimeout);
    Object.values(holeTimers).forEach(clearTimeout);
    holeTimers = {};

    // Reset timer color
    document.getElementById('timer').style.color = '#f0883e';

    // Update stats
    document.getElementById('final-score').textContent = score;
    document.getElementById('stat-hits').textContent = hits;
    document.getElementById('stat-misses').textContent = misses;
    const total = hits + misses;
    document.getElementById('stat-accuracy').textContent = total > 0 ? Math.round(hits / total * 100) + '%' : '0%';
    document.getElementById('stat-best-combo').textContent = bestCombo + 'x';

    // High score
    const prev = getHighScore();
    const isNew = score > prev;
    if (isNew) setHighScore(score);
    document.getElementById('gameover-high-score').textContent = isNew
      ? 'NEW HIGH SCORE! (prev: ' + prev + ')'
      : 'High score: ' + prev;
    document.getElementById('gameover-title').textContent = isNew ? 'NEW RECORD!' : "TIME'S UP";

    // Pick a roast
    document.getElementById('gameover-roast').textContent =
      '"' + ROASTS[Math.floor(Math.random() * ROASTS.length)] + '"';

    showScreen('gameover-screen');
  }

  // Show high score on title
  const hs = getHighScore();
  if (hs > 0) {
    document.getElementById('title-high-score').textContent = 'High score: ' + hs;
  }
})();
</script>
{{ end }}
