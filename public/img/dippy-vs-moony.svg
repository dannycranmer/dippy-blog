<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" width="1000" height="1000">
  <defs>
    <!-- Dippy green glow -->
    <radialGradient id="dippyGlow" cx="30%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#00ff88" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </radialGradient>
    <!-- Moony grey glow -->
    <radialGradient id="moonyGlow" cx="70%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#8b949e" stop-opacity="0.3"/>
      <stop offset="60%" stop-color="#8b949e" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0"/>
    </radialGradient>
    <!-- Lightning bolt gradient -->
    <linearGradient id="boltGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffd700"/>
      <stop offset="50%" stop-color="#ffaa00"/>
      <stop offset="100%" stop-color="#ffd700"/>
    </linearGradient>
    <!-- VS text gradient -->
    <linearGradient id="vsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#ffd700"/>
      <stop offset="100%" stop-color="#ff6600"/>
    </linearGradient>
    <!-- Green energy streaks -->
    <linearGradient id="greenStreak" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>
    <!-- Grey energy streaks -->
    <linearGradient id="greyStreak" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#8b949e" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#8b949e" stop-opacity="0"/>
    </linearGradient>
    <!-- Ground crack glow -->
    <filter id="crackGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Character glow filter -->
    <filter id="charGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Strong glow for VS -->
    <filter id="vsGlow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Spark filter -->
    <filter id="sparkGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ===== BACKGROUND ENERGY ===== -->
  <!-- Ambient glow zones -->
  <rect x="0" y="0" width="1000" height="1000" fill="url(#dippyGlow)"/>
  <rect x="0" y="0" width="1000" height="1000" fill="url(#moonyGlow)"/>

  <!-- Diagonal clash lines radiating from center -->
  <g opacity="0.15">
    <line x1="500" y1="500" x2="0" y2="0" stroke="#ffd700" stroke-width="2"/>
    <line x1="500" y1="500" x2="1000" y2="0" stroke="#ffd700" stroke-width="2"/>
    <line x1="500" y1="500" x2="0" y2="1000" stroke="#ffd700" stroke-width="2"/>
    <line x1="500" y1="500" x2="1000" y2="1000" stroke="#ffd700" stroke-width="2"/>
    <line x1="500" y1="500" x2="0" y2="500" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="500" y1="500" x2="1000" y2="500" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="500" y1="500" x2="500" y2="0" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="500" y1="500" x2="500" y2="1000" stroke="#ffd700" stroke-width="1.5"/>
    <line x1="500" y1="500" x2="150" y2="250" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="850" y2="250" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="150" y2="750" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="850" y2="750" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="250" y2="100" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="750" y2="100" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="250" y2="900" stroke="#ffd700" stroke-width="1"/>
    <line x1="500" y1="500" x2="750" y2="900" stroke="#ffd700" stroke-width="1"/>
  </g>

  <!-- Green energy streaks from left -->
  <g opacity="0.5">
    <line x1="50" y1="380" x2="420" y2="460" stroke="#00ff88" stroke-width="3" opacity="0.6"/>
    <line x1="30" y1="440" x2="400" y2="490" stroke="#00ff88" stroke-width="2" opacity="0.4"/>
    <line x1="80" y1="520" x2="430" y2="510" stroke="#00ff88" stroke-width="2.5" opacity="0.5"/>
    <line x1="60" y1="580" x2="410" y2="540" stroke="#00ff88" stroke-width="2" opacity="0.3"/>
    <line x1="100" y1="340" x2="440" y2="440" stroke="#00ff88" stroke-width="1.5" opacity="0.4"/>
    <line x1="40" y1="620" x2="420" y2="550" stroke="#00ff88" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- Grey energy streaks from right -->
  <g opacity="0.5">
    <line x1="950" y1="380" x2="580" y2="460" stroke="#8b949e" stroke-width="3" opacity="0.6"/>
    <line x1="970" y1="440" x2="600" y2="490" stroke="#8b949e" stroke-width="2" opacity="0.4"/>
    <line x1="920" y1="520" x2="570" y2="510" stroke="#8b949e" stroke-width="2.5" opacity="0.5"/>
    <line x1="940" y1="580" x2="590" y2="540" stroke="#8b949e" stroke-width="2" opacity="0.3"/>
    <line x1="900" y1="340" x2="560" y2="440" stroke="#8b949e" stroke-width="1.5" opacity="0.4"/>
    <line x1="960" y1="620" x2="580" y2="550" stroke="#8b949e" stroke-width="1.5" opacity="0.3"/>
  </g>

  <!-- ===== GROUND CRACK EFFECTS ===== -->
  <g filter="url(#crackGlow)" opacity="0.7">
    <!-- Central crack -->
    <path d="M500 650 L500 700 L495 740 L502 780 L498 830 L500 880 L497 940 L503 1000"
          fill="none" stroke="#ffd700" stroke-width="2.5" opacity="0.8"/>
    <!-- Branching cracks -->
    <path d="M500 720 L470 760 L450 810" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
    <path d="M500 720 L530 755 L555 800" fill="none" stroke="#ffd700" stroke-width="1.5" opacity="0.5"/>
    <path d="M498 780 L460 820 L430 870" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
    <path d="M502 780 L540 825 L570 860" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.4"/>
    <path d="M470 760 L440 770 L410 790" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
    <path d="M530 755 L565 770 L595 785" fill="none" stroke="#ffd700" stroke-width="1" opacity="0.3"/>
  </g>

  <!-- ===== DIPPY (LEFT SIDE) - Facing Right, Battle Stance ===== -->
  <g transform="translate(180, 280) scale(3.8)" filter="url(#charGlow)">
    <!-- Tail - raised aggressively -->
    <path d="M6 52 Q-12 36 -16 18 Q-14 22 -10 24 Q-12 14 -6 6 Q-6 14 -4 20 Q-2 10 4 6 Q2 18 2 28 Q4 36 6 44"
          fill="#00ff88"/>
    <!-- Body - slightly crouched -->
    <ellipse cx="32" cy="52" rx="30" ry="26" fill="#00ff88"/>
    <!-- Back spikes - larger, more aggressive -->
    <polygon points="18,26 24,10 30,26" fill="#00cc6e"/>
    <polygon points="28,23 34,4 40,23" fill="#00cc6e"/>
    <polygon points="38,26 44,12 50,28" fill="#00cc6e"/>
    <polygon points="46,30 51,18 56,32" fill="#00cc6e"/>
    <!-- Neck - thicker, forward leaning -->
    <path d="M50 38 Q58 22 56 6" fill="none" stroke="#00ff88" stroke-width="18" stroke-linecap="round"/>
    <!-- Head - facing right, aggressive tilt -->
    <ellipse cx="58" cy="2" rx="20" ry="15" fill="#00ff88"/>
    <!-- Brow ridge for fierce look -->
    <path d="M62 -6 L74 -8 L78 -4" fill="none" stroke="#00cc6e" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Eye - intense, narrowed -->
    <ellipse cx="66" cy="-2" rx="5" ry="4" fill="#0d1117"/>
    <circle cx="68" cy="-3" r="2" fill="#fff"/>
    <!-- Pupil focused forward -->
    <circle cx="69" cy="-2.5" r="1" fill="#ff3333"/>
    <!-- Mouth - fierce grin -->
    <path d="M72 6 Q80 10 78 14" fill="none" stroke="#0d1117" stroke-width="2" stroke-linecap="round"/>
    <!-- Teeth - sharp, visible -->
    <path d="M72 6 L74 9 L76 6 L78 9 L79 7" fill="#fff" stroke="#fff" stroke-width="0.5"/>
    <!-- Nostril flare -->
    <circle cx="76" cy="0" r="1.2" fill="#00cc6e"/>
    <!-- Legs - wide battle stance -->
    <rect x="16" y="72" width="10" height="20" rx="4" fill="#00cc6e"/>
    <rect x="40" y="72" width="10" height="20" rx="4" fill="#00cc6e"/>
    <!-- Feet - planted firmly -->
    <ellipse cx="21" cy="93" rx="9" ry="4" fill="#00cc6e"/>
    <ellipse cx="45" cy="93" rx="9" ry="4" fill="#00cc6e"/>
    <!-- Arms - raised in fighting pose -->
    <rect x="52" y="36" width="7" height="14" rx="3" fill="#00cc6e" transform="rotate(-40 55 43)"/>
    <rect x="58" y="32" width="7" height="14" rx="3" fill="#00cc6e" transform="rotate(15 61 39)"/>
    <!-- Fist/claw -->
    <circle cx="62" cy="30" r="4" fill="#00cc6e"/>
    <path d="M60 27 L59 24 M62 26 L62 23 M64 27 L65 24" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- Green candlestick chart floating behind Dippy -->
  <g transform="translate(80, 200)" opacity="0.25">
    <!-- Bullish candles -->
    <rect x="0" y="60" width="12" height="40" fill="#00ff88"/>
    <line x1="6" y1="50" x2="6" y2="110" stroke="#00ff88" stroke-width="2"/>
    <rect x="20" y="40" width="12" height="50" fill="#00ff88"/>
    <line x1="26" y1="25" x2="26" y2="100" stroke="#00ff88" stroke-width="2"/>
    <rect x="40" y="20" width="12" height="60" fill="#00ff88"/>
    <line x1="46" y1="5" x2="46" y2="90" stroke="#00ff88" stroke-width="2"/>
    <rect x="60" y="10" width="12" height="45" fill="#00ff88"/>
    <line x1="66" y1="0" x2="66" y2="65" stroke="#00ff88" stroke-width="2"/>
  </g>

  <!-- ===== MOONY (RIGHT SIDE) - Facing Left, Battle Stance ===== -->
  <g transform="translate(560, 260)" filter="url(#charGlow)">
    <!-- Moony body - large crescent moon -->
    <circle cx="180" cy="200" r="140" fill="#c4c4c4"/>
    <!-- Crescent shadow -->
    <circle cx="120" cy="200" r="110" fill="none" opacity="0"/>
    <!-- Crater details for texture -->
    <circle cx="210" cy="150" r="18" fill="#a0a0a0" opacity="0.5"/>
    <circle cx="240" cy="220" r="12" fill="#a0a0a0" opacity="0.4"/>
    <circle cx="170" cy="260" r="15" fill="#a0a0a0" opacity="0.45"/>
    <circle cx="200" cy="190" r="8" fill="#a0a0a0" opacity="0.35"/>
    <circle cx="145" cy="160" r="10" fill="#a0a0a0" opacity="0.3"/>
    <circle cx="230" cy="280" r="9" fill="#a0a0a0" opacity="0.3"/>
    <!-- Crescent cutout - creates moon shape -->
    <circle cx="110" cy="190" r="108" fill-opacity="0">
      <!-- Using a mask approach with dark overlay -->
    </circle>
    <!-- Dark side of moon overlay for crescent effect -->
    <clipPath id="moonClip">
      <circle cx="180" cy="200" r="140"/>
    </clipPath>
    <circle cx="100" cy="185" r="120" fill="#1a1a2e" opacity="0.7" clip-path="url(#moonClip)"/>

    <!-- Angry eye - left side (facing Dippy) -->
    <ellipse cx="195" cy="175" rx="20" ry="18" fill="#2d2d44"/>
    <ellipse cx="195" cy="175" rx="14" ry="13" fill="#484f58"/>
    <circle cx="190" cy="173" r="7" fill="#1a1a2e"/>
    <!-- Red angry pupil -->
    <circle cx="188" cy="172" r="3" fill="#ff4444"/>
    <!-- Eye highlight -->
    <circle cx="193" cy="169" r="3" fill="#ffffff" opacity="0.6"/>
    <!-- Angry brow -->
    <path d="M175 155 L200 160 L218 152" fill="none" stroke="#2d2d44" stroke-width="6" stroke-linecap="round"/>

    <!-- Second eye -->
    <ellipse cx="240" cy="180" rx="16" ry="14" fill="#2d2d44"/>
    <ellipse cx="240" cy="180" rx="11" ry="10" fill="#484f58"/>
    <circle cx="236" cy="178" r="5.5" fill="#1a1a2e"/>
    <circle cx="234" cy="177" r="2.5" fill="#ff4444"/>
    <circle cx="238" cy="175" r="2.5" fill="#ffffff" opacity="0.6"/>
    <!-- Angry brow -->
    <path d="M225 163 L245 167 L258 160" fill="none" stroke="#2d2d44" stroke-width="5" stroke-linecap="round"/>

    <!-- Angry mouth - snarl -->
    <path d="M185 225 Q205 250 235 230 Q250 222 260 228" fill="none" stroke="#2d2d44" stroke-width="5" stroke-linecap="round"/>
    <!-- Teeth -->
    <path d="M198 233 L202 242 L206 233 L210 241 L214 234 L218 242 L222 233" fill="#c4c4c4" stroke="#2d2d44" stroke-width="1.5"/>

    <!-- Moony surface cracks (battle damage) -->
    <path d="M140 240 L155 260 L148 280" fill="none" stroke="#6e7681" stroke-width="2" opacity="0.5"/>
    <path d="M270 160 L280 180 L275 200" fill="none" stroke="#6e7681" stroke-width="1.5" opacity="0.4"/>
  </g>

  <!-- Red bearish candles floating behind Moony -->
  <g transform="translate(830, 200)" opacity="0.25">
    <rect x="0" y="10" width="12" height="45" fill="#ff4444"/>
    <line x1="6" y1="0" x2="6" y2="65" stroke="#ff4444" stroke-width="2"/>
    <rect x="20" y="20" width="12" height="60" fill="#ff4444"/>
    <line x1="26" y1="5" x2="26" y2="90" stroke="#ff4444" stroke-width="2"/>
    <rect x="40" y="40" width="12" height="50" fill="#ff4444"/>
    <line x1="46" y1="25" x2="46" y2="100" stroke="#ff4444" stroke-width="2"/>
    <rect x="60" y="60" width="12" height="40" fill="#ff4444"/>
    <line x1="66" y1="50" x2="66" y2="110" stroke="#ff4444" stroke-width="2"/>
  </g>

  <!-- ===== CENTRAL CLASH EFFECTS ===== -->

  <!-- Lightning bolts from clash point -->
  <g filter="url(#sparkGlow)">
    <!-- Main bolt left -->
    <path d="M480 420 L460 380 L475 385 L455 340 L472 348 L458 300 L478 320 L470 280"
          fill="none" stroke="url(#boltGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Main bolt right -->
    <path d="M520 420 L540 380 L525 385 L545 340 L528 348 L542 300 L522 320 L530 280"
          fill="none" stroke="url(#boltGrad)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bolt down-left -->
    <path d="M490 520 L470 560 L485 555 L465 600 L480 592 L460 640"
          fill="none" stroke="url(#boltGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Bolt down-right -->
    <path d="M510 520 L530 560 L515 555 L535 600 L520 592 L540 640"
          fill="none" stroke="url(#boltGrad)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Small bolt upper-left -->
    <path d="M470 450 L440 430 L452 428 L420 400"
          fill="none" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
    <!-- Small bolt upper-right -->
    <path d="M530 450 L560 430 L548 428 L580 400"
          fill="none" stroke="#ffd700" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  </g>

  <!-- Sparks at clash point -->
  <g filter="url(#sparkGlow)">
    <circle cx="500" cy="480" r="3" fill="#ffd700"/>
    <circle cx="488" cy="465" r="2" fill="#ffaa00"/>
    <circle cx="512" cy="470" r="2.5" fill="#ffd700"/>
    <circle cx="495" cy="492" r="2" fill="#ffffff"/>
    <circle cx="508" cy="488" r="1.5" fill="#ffaa00"/>
    <circle cx="480" cy="478" r="1.5" fill="#ffd700"/>
    <circle cx="520" cy="476" r="2" fill="#ffffff"/>
    <circle cx="492" cy="450" r="1.8" fill="#ffd700"/>
    <circle cx="510" cy="455" r="1.5" fill="#ffaa00"/>
    <circle cx="475" cy="495" r="1.2" fill="#ffd700"/>
    <circle cx="525" cy="490" r="1.8" fill="#ffffff"/>
  </g>

  <!-- ===== "VS" TEXT ===== -->
  <g filter="url(#vsGlow)">
    <text x="500" y="510" text-anchor="middle" font-family="'Impact','Arial Black','Helvetica Neue',sans-serif"
          font-size="120" font-weight="900" fill="url(#vsGrad)"
          stroke="#ff6600" stroke-width="3" letter-spacing="8">VS</text>
  </g>

  <!-- ===== TITLE TEXT ===== -->
  <!-- DIPPY label -->
  <g filter="url(#charGlow)">
    <text x="220" y="130" text-anchor="middle" font-family="'Impact','Arial Black','Helvetica Neue',sans-serif"
          font-size="72" font-weight="900" fill="#00ff88"
          stroke="#00cc6e" stroke-width="2" letter-spacing="6">DIPPY</text>
  </g>

  <!-- MOONY label -->
  <g filter="url(#charGlow)">
    <text x="780" y="130" text-anchor="middle" font-family="'Impact','Arial Black','Helvetica Neue',sans-serif"
          font-size="72" font-weight="900" fill="#c4c4c4"
          stroke="#6e7681" stroke-width="2" letter-spacing="6">MOONY</text>
  </g>

  <!-- Subtitle -->
  <text x="500" y="920" text-anchor="middle" font-family="'Courier New',monospace"
        font-size="28" font-weight="700" fill="#ffd700" letter-spacing="12" opacity="0.8">THE ULTIMATE SHOWDOWN</text>

  <!-- Bottom accent line -->
  <line x1="250" y1="940" x2="750" y2="940" stroke="#ffd700" stroke-width="1" opacity="0.4"/>

  <!-- Scattered energy particles -->
  <g opacity="0.6">
    <!-- Green particles (Dippy's side) -->
    <circle cx="120" cy="350" r="3" fill="#00ff88"/>
    <circle cx="90" cy="500" r="2" fill="#00ff88"/>
    <circle cx="150" cy="650" r="2.5" fill="#00ff88"/>
    <circle cx="60" cy="420" r="1.8" fill="#00ff88"/>
    <circle cx="200" cy="720" r="2" fill="#00ff88"/>
    <circle cx="170" cy="300" r="1.5" fill="#00ff88"/>
    <circle cx="300" cy="750" r="2.2" fill="#00ff88"/>
    <circle cx="100" cy="280" r="1.8" fill="#00ff88"/>
    <!-- Grey particles (Moony's side) -->
    <circle cx="880" cy="350" r="3" fill="#8b949e"/>
    <circle cx="910" cy="500" r="2" fill="#8b949e"/>
    <circle cx="850" cy="650" r="2.5" fill="#8b949e"/>
    <circle cx="940" cy="420" r="1.8" fill="#8b949e"/>
    <circle cx="800" cy="720" r="2" fill="#8b949e"/>
    <circle cx="830" cy="300" r="1.5" fill="#8b949e"/>
    <circle cx="700" cy="750" r="2.2" fill="#8b949e"/>
    <circle cx="900" cy="280" r="1.8" fill="#8b949e"/>
  </g>

  <!-- Floating dollar signs near clash -->
  <g opacity="0.2" font-family="'Courier New',monospace" font-size="24" font-weight="bold">
    <text x="420" y="350" fill="#00ff88" transform="rotate(-15 420 350)">$</text>
    <text x="570" y="340" fill="#8b949e" transform="rotate(20 570 340)">$</text>
    <text x="380" y="600" fill="#00ff88" transform="rotate(10 380 600)">$</text>
    <text x="610" y="610" fill="#8b949e" transform="rotate(-12 610 610)">$</text>
    <text x="440" y="280" fill="#ffd700" transform="rotate(-8 440 280)">$</text>
    <text x="560" y="650" fill="#ffd700" transform="rotate(15 560 650)">$</text>
  </g>
</svg>