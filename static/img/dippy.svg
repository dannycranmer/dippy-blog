<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Body -->
  <ellipse cx="52" cy="72" rx="28" ry="24" fill="#00ff88"/>
  <!-- Tail -->
  <path d="M24 72 Q8 58 4 42 Q6 44 10 46 Q8 36 12 28 Q14 36 16 40 Q18 32 24 28 Q22 38 22 48 Q24 54 26 60" fill="#00ff88"/>
  <!-- Neck -->
  <path d="M68 56 Q74 40 72 24" fill="none" stroke="#00ff88" stroke-width="16" stroke-linecap="round"/>
  <!-- Head -->
  <ellipse cx="72" cy="18" rx="18" ry="14" fill="#00ff88"/>
  <!-- Eye -->
  <circle cx="78" cy="14" r="4" fill="#0d1117"/>
  <circle cx="79.5" cy="12.5" r="1.5" fill="#fff"/>
  <!-- Mouth -->
  <path d="M86 20 Q88 22 86 24" fill="none" stroke="#0d1117" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Teeth (trading bot grin) -->
  <path d="M84 20 L85 22 L86 20" fill="#fff"/>
  <!-- Legs -->
  <rect x="38" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
  <rect x="56" y="90" width="8" height="16" rx="3" fill="#00cc6e"/>
  <!-- Feet -->
  <ellipse cx="42" cy="107" rx="7" ry="3" fill="#00cc6e"/>
  <ellipse cx="60" cy="107" rx="7" ry="3" fill="#00cc6e"/>
  <!-- Arms (tiny T-Rex arms holding a chart) -->
  <rect x="66" y="58" width="5" height="10" rx="2" fill="#00cc6e" transform="rotate(-20 68 63)"/>
  <rect x="72" y="56" width="5" height="10" rx="2" fill="#00cc6e" transform="rotate(10 74 61)"/>
  <!-- Chart in hands -->
  <rect x="76" y="48" width="18" height="14" rx="2" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <!-- Chart line (going up!) -->
  <polyline points="79,58 83,55 86,57 89,51 91,49" fill="none" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Spikes on back -->
  <polygon points="44,48 48,36 52,48" fill="#00cc6e"/>
  <polygon points="52,46 56,32 60,46" fill="#00cc6e"/>
  <polygon points="60,48 64,38 68,50" fill="#00cc6e"/>
</svg>
